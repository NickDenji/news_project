<!DOCTYPE html>
<html>
<head>
    <title>Create Article</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h2>Create Article</h2>

    <form method="post">
        {% csrf_token %}

        <input name="title" class="form-control mb-2" placeholder="Title" required>

        <textarea name="content" class="form-control mb-3" placeholder="Content" required></textarea>

        <label>Publisher</label>
        <select name="publisher" class="form-select mb-3">
            <option value="">No Publisher</option>
            {% for publisher in publishers %}
                <option value="{{ publisher.id }}">{{ publisher.name }}</option>
            {% endfor %}
        </select>

        <button class="btn btn-primary">Create Article</button>
    </form>

    <a href="/" class="btn btn-secondary mt-3">Back</a>

</div>

</body>
</html>
